<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Products | Roma Store Admin</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:#f5f5f5;
}

.container{
width:95%;
max-width:1400px;
margin:30px auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h1{
margin:0;
}

.add-btn{
background:#000;
color:#fff;
padding:12px 22px;
border-radius:8px;
text-decoration:none;
}

.filters{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.filters input,
.filters select{

padding:12px;
border:1px solid #ddd;
border-radius:8px;

}

table{

width:100%;
background:#fff;
border-collapse:collapse;
border-radius:12px;
overflow:hidden;

}

th{

background:#111;
color:#fff;
padding:15px;

}

td{

padding:15px;
text-align:center;
border-bottom:1px solid #eee;

}

td img{

width:70px;
height:70px;
object-fit:cover;
border-radius:10px;

}

.status{

padding:5px 10px;
border-radius:20px;
font-size:13px;
font-weight:bold;

}

.in{
background:#d4edda;
color:#155724;
}

.low{
background:#fff3cd;
color:#856404;
}

.out{
background:#f8d7da;
color:#721c24;
}

.actions button{

margin:2px;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;

}

.edit{
background:#007bff;
color:white;
}

.delete{
background:#dc3545;
color:white;
}

.featured{

cursor:pointer;
font-size:22px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Products</h1>

<a href="add-product.html" class="add-btn">
<i class="fa fa-plus"></i>
Add Product
</a>

</div>

<div class="filters">

<input
type="text"
id="search"
placeholder="Search Products...">

<select id="categoryFilter">

<option value="">All Categories</option>

<option>Men</option>
<option>Women</option>
<option>Kids</option>
<option>Shoes</option>

</select>

<select id="brandFilter">

<option value="">All Brands</option>

</select>

<select id="sortFilter">

<option value="newest">Newest</option>
<option value="oldest">Oldest</option>
<option value="high">Highest Price</option>
<option value="low">Lowest Price</option>

</select>

</div>

<table>

<thead>

<tr>

<th>Image</th>
<th>Name</th>
<th>Brand</th>
<th>Price</th>
<th>Stock</th>
<th>Status</th>
<th>Featured</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="productsTable">

<tr>

<td colspan="8">

Loading Products...

</td>

</tr>

</tbody>

</table>

</div>
<script src="products.js"></script>
<script>
console.log([...document.scripts].map(s => s.src));
</script>
</body>
</html>
