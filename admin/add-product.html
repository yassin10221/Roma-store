<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product | Roma Store Admin</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>

body{
    background:#f5f5f5;
    font-family:Poppins,sans-serif;
    margin:0;
}

.container{
    width:95%;
    max-width:1200px;
    margin:40px auto;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    font-weight:600;
    margin-bottom:8px;
}

.form-group input,
.form-group textarea,
.form-group select{

    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;

}

textarea{
    height:140px;
    resize:none;
}

.images-preview{

    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
    margin-top:20px;

}

.preview-card{

    position:relative;

}

.preview-card img{

    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;

}

.remove{

    position:absolute;
    top:8px;
    right:8px;

    width:30px;
    height:30px;

    border:none;

    border-radius:50%;

    background:red;

    color:#fff;

    cursor:pointer;

}

.buttons{

    margin-top:30px;

}

.save-btn{

    background:#000;

    color:#fff;

    border:none;

    padding:15px 40px;

    border-radius:10px;

    cursor:pointer;

}

.checkbox{

    display:flex;

    align-items:center;

    gap:10px;

    margin-top:20px;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>

<i class="fa-solid fa-plus"></i>

Add Product

</h1>

<div class="grid">

<div class="form-group">

<label>Name</label>

<input id="name">

</div>

<div class="form-group">

<label>Brand</label>

<input id="brand">

</div>

<div class="form-group">

<label>Category</label>

<select id="category">

<option value="Men">Men</option>

<option value="Women">Women</option>

<option value="Kids">Kids</option>

<option value="Shoes">Shoes</option>

</select>

</div>

<div class="form-group">

<label>Price</label>

<input
type="number"
id="price">

</div>

<div class="form-group">

<label>Old Price</label>

<input
type="number"
id="oldPrice">

</div>

<div class="form-group">

<label>Stock</label>

<input
type="number"
id="stock">

</div>

<div class="form-group">

<label>Sizes</label>

<input
id="sizes"
placeholder="S,M,L,XL">

</div>

<div class="form-group">

<label>Colors</label>

<input
id="colors"
placeholder="Black,White">

</div>

</div>

<div class="form-group" style="margin-top:20px;">

<label>Description</label>

<textarea id="description"></textarea>

</div>

<div class="checkbox">

<input
type="checkbox"
id="featured">

<label for="featured">

Featured Product

</label>

</div>

<h3 style="margin-top:30px;">

Product Images

</h3>

<input
type="file"
id="images"
multiple
accept="image/*">

<div
id="preview"
class="images-preview">

</div>

<div class="buttons">

<button
id="saveBtn"
class="save-btn">

<i class="fa-solid fa-floppy-disk"></i>

Save Product

</button>

</div>

</div>

</div>

<script src="add-product.js"></script>

</body>

</html>
