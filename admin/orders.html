<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Orders | Roma Store Admin</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Poppins,sans-serif;
}

.container{
    width:95%;
    max-width:1400px;
    margin:30px auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

input,select{

    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;

}

.filters{

    display:flex;
    gap:15px;
    margin-bottom:20px;

}

table{

    width:100%;
    border-collapse:collapse;
    background:#fff;

}

th{

    background:#111;
    color:white;
    padding:15px;

}

td{

    padding:15px;
    text-align:center;
    border-bottom:1px solid #eee;

}

button{

    padding:8px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;

}

.view{

    background:#007bff;
    color:white;

}

.delete{

    background:#dc3545;
    color:white;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Orders</h1>

</div>

<div class="filters">

<input
id="search"
placeholder="Search...">

<select id="statusFilter">

<option value="">All Status</option>

<option value="Pending">Pending</option>

<option value="Processing">Processing</option>

<option value="Shipped">Shipped</option>

<option value="Delivered">Delivered</option>

<option value="Cancelled">Cancelled</option>

</select>

</div>

<table>

<thead>

<tr>

<th>ID</th>
<th>Customer</th>
<th>Email</th>
<th>Total</th>
<th>Status</th>
<th>Date</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="ordersTable">

<tr>

<td colspan="7">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<script src="orders.js"></script>

</body>

</html>
