<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Edit Product</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:#f5f5f5;
}

.container{

max-width:1200px;
margin:auto;
padding:30px;

}

.card{

background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.08);

}

.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;

}

input,
textarea,
select{

width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;

}

textarea{

height:140px;
resize:none;

}

.images{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
margin-top:30px;

}

.image-card{

position:relative;

}

.image-card img{

width:100%;
height:170px;
object-fit:cover;
border-radius:10px;

}

.delete-image{

position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
border:none;
width:35px;
height:35px;
border-radius:50%;
cursor:pointer;

}

.buttons{

display:flex;
gap:15px;
margin-top:30px;

}

.save{

background:#000;
color:#fff;
padding:15px 30px;
border:none;
border-radius:10px;
cursor:pointer;

}

.cancel{

background:#ccc;
padding:15px 30px;
border:none;
border-radius:10px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Edit Product</h2>

<div class="grid">

<input id="name" placeholder="Name">

<input id="brand" placeholder="Brand">

<input id="price" type="number" placeholder="Price">

<input id="oldPrice" type="number" placeholder="Old Price">

<input id="stock" type="number" placeholder="Stock">

<select id="category">

<option>Men</option>
<option>Women</option>
<option>Kids</option>
<option>Shoes</option>

</select>

</div>

<textarea
id="description"
placeholder="Description"></textarea>

<h3 style="margin-top:30px">

Current Images

</h3>

<div
id="images"
class="images">

</div>

<h3>

Add Images

</h3>

<input
id="newImages"
type="file"
multiple
accept="image/*">

<div class="buttons">

<button
id="saveBtn"
class="save">

Save Changes

</button>

<button
onclick="history.back()"
class="cancel">

Cancel

</button>

</div>

</div>

</div>

<script src="edit-product.js"></script>

</body>
</html>
