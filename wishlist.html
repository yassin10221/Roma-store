<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wishlist | Roma Store</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<a href="index.html" class="logo">
<span>Roma</span> Store
</a>

<nav class="navbar">

<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="wishlist.html" class="active">Wishlist</a>
<a href="cart.html">Cart</a>

</nav>

<div class="header-icons">

<a href="wishlist.html" class="icon-btn">

<i class="fa-regular fa-heart"></i>

<span id="wishlist-count" class="count">0</span>

</a>

<a href="cart.html" class="icon-btn">

<i class="fa-solid fa-cart-shopping"></i>

<span id="cart-count" class="count">0</span>

</a>

</div>

</header>

<section class="products">

<div class="section-title">

<h2>My Wishlist</h2>

<p>Your favourite products</p>

</div>

<div id="wishlist-container" class="products-grid">

</div>

</section>

<script src="js/app.js"></script>
<script src="js/wishlist.js"></script>

<script>

const container=document.getElementById("wishlist-container");

function renderWishlist(){

const wishlist=JSON.parse(localStorage.getItem("wishlist"))||[];

if(wishlist.length===0){

container.innerHTML=`

<div style="text-align:center;width:100%;padding:80px">

<h2>Your Wishlist Is Empty</h2>

<br>

<a href="shop.html" class="add-cart">

Continue Shopping

</a>

</div>

`;

return;

}

container.innerHTML="";

wishlist.forEach(product=>{

container.innerHTML+=`

<div class="product-card">

<div class="product-image">

<img src="${product.image}">

</div>

<div class="product-info">

<p>${product.category||""}</p>

<h3>${product.name}</h3>

<div class="price-box">

<span class="price">

${Number(product.price).toLocaleString()} EGP

</span>

</div>

<button class="add-cart"

onclick='addToCart(${JSON.stringify(product)})'>

Add To Cart

</button>

<br><br>

<button class="buy-now"

onclick="removeWishlist(${product.id})">

Remove

</button>

</div>

</div>

`;

});

}

function removeWishlist(id){

let wishlist=JSON.parse(localStorage.getItem("wishlist"))||[];

wishlist=wishlist.filter(item=>item.id!=id);

localStorage.setItem("wishlist",JSON.stringify(wishlist));

renderWishlist();

updateWishlistCount();

}

renderWishlist();

</script>

</body>

</html>
